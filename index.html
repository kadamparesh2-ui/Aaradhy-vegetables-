<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ताजी भाजी</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Tiro+Devanagari+Marathi&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #2d6a2d;
    --green-light: #4a9b4a;
    --green-pale: #e8f5e8;
    --orange: #e8650a;
    --orange-light: #ff8c3a;
    --yellow: #f5c842;
    --white: #fffef8;
    --text: #1a2e1a;
    --text-light: #5a7a5a;
    --border: #c8e0c8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Baloo 2', sans-serif;
    background: var(--white);
    color: var(--text);
    min-height: 100vh;
  }

  /* ===== CUSTOMER PAGE ===== */
  #customerPage { display: block; }
  #adminPage { display: none; }

  /* Header */
  .header {
    background: linear-gradient(135deg, var(--green) 0%, var(--green-light) 100%);
    color: white;
    padding: 24px 20px 20px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -30px; right: -30px;
    width: 120px; height: 120px;
    background: rgba(255,255,255,0.08);
    border-radius: 50%;
  }
  .header::after {
    content: '';
    position: absolute;
    bottom: -20px; left: -20px;
    width: 80px; height: 80px;
    background: rgba(255,255,255,0.06);
    border-radius: 50%;
  }
  .header-emoji { font-size: 2.5rem; margin-bottom: 4px; }
  .shop-name {
    font-size: 1.8rem;
    font-weight: 800;
    letter-spacing: -0.5px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  .shop-tagline {
    font-size: 0.9rem;
    opacity: 0.85;
    margin-top: 2px;
  }
  .update-time {
    margin-top: 10px;
    background: rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 0.78rem;
    display: inline-block;
  }

  /* Closed banner */
  .closed-banner {
    background: #c0392b;
    color: white;
    text-align: center;
    padding: 14px;
    font-size: 1rem;
    font-weight: 700;
    display: none;
  }

  /* Price list */
  .section-title {
    padding: 18px 20px 10px;
    font-size: 1rem;
    font-weight: 700;
    color: var(--green);
    text-transform: uppercase;
    letter-spacing: 1px;
    border-bottom: 2px dashed var(--border);
    margin: 0 16px;
  }

  .items-list {
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .item-card {
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 2px 8px rgba(45,106,45,0.07);
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }

  .item-left { display: flex; align-items: center; gap: 12px; }
  .item-emoji { font-size: 1.6rem; }
  .item-name { font-size: 1rem; font-weight: 700; color: var(--text); }
  .item-unit { font-size: 0.78rem; color: var(--text-light); margin-top: 1px; }

  .item-price {
    background: linear-gradient(135deg, var(--orange), var(--orange-light));
    color: white;
    font-size: 1rem;
    font-weight: 800;
    padding: 6px 14px;
    border-radius: 20px;
    white-space: nowrap;
  }

  .badge-fresh {
    background: var(--green-pale);
    color: var(--green);
    font-size: 0.65rem;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 10px;
    margin-top: 3px;
    display: inline-block;
  }
  .badge-limited {
    background: #fff3cd;
    color: #856404;
    font-size: 0.65rem;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 10px;
    margin-top: 3px;
    display: inline-block;
  }

  .empty-msg {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-light);
    font-size: 1rem;
  }

  /* WhatsApp Button */
  .wa-section {
    padding: 20px 16px 30px;
  }
  .wa-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: #25D366;
    color: white;
    font-family: 'Baloo 2', sans-serif;
    font-size: 1.1rem;
    font-weight: 800;
    padding: 16px;
    border-radius: 16px;
    text-decoration: none;
    box-shadow: 0 4px 20px rgba(37,211,102,0.35);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .wa-btn:active { transform: scale(0.97); box-shadow: 0 2px 10px rgba(37,211,102,0.25); }
  .wa-icon { width: 26px; height: 26px; }

  /* Admin link */
  .admin-link-wrap {
    text-align: center;
    padding: 8px 0 20px;
  }
  .admin-link {
    font-size: 0.75rem;
    color: var(--border);
    text-decoration: none;
    cursor: pointer;
  }
  .admin-link:hover { color: var(--text-light); }

  /* ===== ADMIN PAGE ===== */
  .admin-header {
    background: var(--text);
    color: white;
    padding: 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .admin-header h2 { font-size: 1.2rem; font-weight: 800; }
  .back-btn {
    background: rgba(255,255,255,0.15);
    border: none;
    color: white;
    padding: 6px 14px;
    border-radius: 20px;
    font-family: 'Baloo 2', sans-serif;
    font-size: 0.85rem;
    cursor: pointer;
  }

  /* Login */
  .login-wrap {
    padding: 40px 20px;
    max-width: 360px;
    margin: 0 auto;
  }
  .login-wrap h3 { font-size: 1.3rem; margin-bottom: 20px; text-align: center; }
  .input-field {
    width: 100%;
    padding: 14px 16px;
    border: 2px solid var(--border);
    border-radius: 12px;
    font-family: 'Baloo 2', sans-serif;
    font-size: 1rem;
    margin-bottom: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .input-field:focus { border-color: var(--green); }
  .btn-primary {
    width: 100%;
    background: var(--green);
    color: white;
    border: none;
    padding: 14px;
    border-radius: 12px;
    font-family: 'Baloo 2', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-primary:hover { background: var(--green-light); }
  .error-msg { color: #c0392b; font-size: 0.85rem; text-align: center; margin-top: 8px; }

  /* Admin Panel */
  .admin-panel { padding: 16px; display: none; }

  .settings-card {
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 18px;
    margin-bottom: 16px;
  }
  .settings-card h4 {
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--green);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 14px;
  }

  .setting-row {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 10px;
  }
  .setting-label { font-size: 0.85rem; color: var(--text-light); font-weight: 600; }

  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .toggle-label { font-size: 0.9rem; font-weight: 600; }
  .toggle {
    position: relative;
    width: 48px;
    height: 26px;
  }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider {
    position: absolute;
    inset: 0;
    background: #ccc;
    border-radius: 26px;
    cursor: pointer;
    transition: 0.3s;
  }
  .toggle-slider::before {
    content: '';
    position: absolute;
    width: 20px; height: 20px;
    left: 3px; top: 3px;
    background: white;
    border-radius: 50%;
    transition: 0.3s;
  }
  .toggle input:checked + .toggle-slider { background: var(--green); }
  .toggle input:checked + .toggle-slider::before { transform: translateX(22px); }

  /* Items admin */
  .items-admin { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }

  .item-admin-card {
    background: var(--green-pale);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
  }
  .item-admin-top {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .item-admin-top input {
    flex: 1;
    padding: 8px 10px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-family: 'Baloo 2', sans-serif;
    font-size: 0.9rem;
    background: white;
    outline: none;
  }
  .item-admin-top input:focus { border-color: var(--green); }
  .item-admin-bottom {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .item-admin-bottom input {
    flex: 1;
    padding: 8px 10px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-family: 'Baloo 2', sans-serif;
    font-size: 0.9rem;
    background: white;
    outline: none;
  }
  .item-admin-bottom input:focus { border-color: var(--green); }
  .badge-select {
    padding: 8px 10px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-family: 'Baloo 2', sans-serif;
    font-size: 0.85rem;
    background: white;
    outline: none;
    color: var(--text);
  }
  .del-btn {
    background: #fee2e2;
    border: none;
    color: #c0392b;
    width: 34px;
    height: 34px;
    border-radius: 8px;
    font-size: 1rem;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .add-item-btn {
    width: 100%;
    background: var(--green-pale);
    color: var(--green);
    border: 2px dashed var(--green-light);
    padding: 12px;
    border-radius: 12px;
    font-family: 'Baloo 2', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    margin-bottom: 16px;
  }

  .save-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--orange), var(--orange-light));
    color: white;
    border: none;
    padding: 16px;
    border-radius: 14px;
    font-family: 'Baloo 2', sans-serif;
    font-size: 1.1rem;
    font-weight: 800;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(232,101,10,0.3);
  }

  .save-success {
    text-align: center;
    color: var(--green);
    font-weight: 700;
    font-size: 0.9rem;
    margin-top: 10px;
    display: none;
  }

  /* Password change */
  .logout-btn {
    width: 100%;
    background: #f8f8f8;
    color: var(--text-light);
    border: 1.5px solid var(--border);
    padding: 12px;
    border-radius: 12px;
    font-family: 'Baloo 2', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
  }
</style>
</head>
<body>

<!-- ===== CUSTOMER PAGE ===== -->
<div id="customerPage">
  <div class="closed-banner" id="closedBanner">🚫 आज दुकान बंद आहे</div>

  <div class="header">
    <div class="header-emoji">🥦</div>
    <div class="shop-name" id="displayShopName">ताजी भाजी</div>
    <div class="shop-tagline" id="displayTagline">रोज ताजे • थेट शेतातून</div>
    <div class="update-time" id="displayUpdateTime">—</div>
  </div>

  <div class="section-title">आजच्या भाज्या 🌿</div>

  <div class="items-list" id="customerItems">
    <div class="empty-msg">⏳ लोड होत आहे...</div>
  </div>

  <div class="wa-section">
    <a class="wa-btn" id="waBtn" href="#" target="_blank">
      <svg class="wa-icon" viewBox="0 0 32 32" fill="white" xmlns="http://www.w3.org/2000/svg">
        <path d="M16 2C8.268 2 2 8.268 2 16c0 2.478.677 4.799 1.855 6.793L2 30l7.393-1.836A13.93 13.93 0 0016 30c7.732 0 14-6.268 14-14S23.732 2 16 2zm0 25.6a11.56 11.56 0 01-5.893-1.607l-.422-.252-4.387 1.09 1.113-4.273-.276-.44A11.558 11.558 0 014.4 16C4.4 9.593 9.593 4.4 16 4.4S27.6 9.593 27.6 16 22.407 27.6 16 27.6zm6.34-8.647c-.348-.174-2.059-1.016-2.379-1.132-.32-.116-.552-.174-.784.174-.232.347-.9 1.132-1.103 1.366-.203.232-.406.26-.754.086-.348-.174-1.469-.541-2.797-1.725-1.034-.922-1.732-2.06-1.935-2.408-.203-.348-.022-.536.153-.709.157-.155.348-.406.522-.609.174-.203.232-.348.348-.58.116-.232.058-.435-.029-.609-.087-.174-.784-1.89-1.074-2.588-.283-.68-.57-.588-.784-.599l-.667-.011c-.232 0-.609.087-.928.435-.32.347-1.22 1.19-1.22 2.903s1.249 3.368 1.423 3.6c.174.232 2.457 3.75 5.953 5.261.832.359 1.482.574 1.989.734.835.266 1.595.228 2.196.138.67-.1 2.059-.842 2.349-1.654.29-.812.29-1.508.203-1.654-.086-.145-.318-.232-.667-.406z"/>
      </svg>
      WhatsApp वर Order करा
    </a>
  </div>

  <div class="admin-link-wrap">
    <span class="admin-link" onclick="showAdmin()">⚙ Admin</span>
  </div>
</div>

<!-- ===== ADMIN PAGE ===== -->
<div id="adminPage">
  <div class="admin-header">
    <h2>⚙ Admin Panel</h2>
    <button class="back-btn" onclick="goBack()">← मागे</button>
  </div>

  <!-- Login -->
  <div class="login-wrap" id="loginWrap">
    <h3>🔐 Login करा</h3>
    <input class="input-field" type="password" id="pwdInput" placeholder="Password टाका" onkeydown="if(event.key==='Enter') checkLogin()">
    <button class="btn-primary" onclick="checkLogin()">Login</button>
    <div class="error-msg" id="loginError"></div>
  </div>

  <!-- Panel -->
  <div class="admin-panel" id="adminPanel">

    <!-- Shop Settings -->
    <div class="settings-card">
      <h4>🏪 दुकान माहिती</h4>
      <div class="setting-row">
        <span class="setting-label">दुकानाचे नाव</span>
        <input class="input-field" id="shopName" placeholder="उदा. PB Vegetables" style="margin-bottom:0">
      </div>
      <div class="setting-row">
        <span class="setting-label">Tagline</span>
        <input class="input-field" id="shopTagline" placeholder="उदा. रोज ताजे • थेट शेतातून" style="margin-bottom:0">
      </div>
      <div class="setting-row">
        <span class="setting-label">WhatsApp Number (91XXXXXXXXXX)</span>
        <input class="input-field" id="waNumber" placeholder="919876543210" style="margin-bottom:0" type="tel">
      </div>
      <div class="toggle-row" style="margin-top:14px">
        <span class="toggle-label">🚫 आज दुकान बंद</span>
        <label class="toggle">
          <input type="checkbox" id="shopClosed">
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>

    <!-- Items -->
    <div class="settings-card">
      <h4>🥦 भाज्यांची यादी</h4>
      <div class="items-admin" id="adminItems"></div>
      <button class="add-item-btn" onclick="addItem()">+ नवीन भाजी Add करा</button>
    </div>

    <!-- Password -->
    <div class="settings-card">
      <h4>🔐 Password बदला</h4>
      <input class="input-field" id="newPwd" type="password" placeholder="नवीन password" style="margin-bottom:8px">
      <input class="input-field" id="confirmPwd" type="password" placeholder="पुन्हा टाका" style="margin-bottom:0">
    </div>

    <button class="save-btn" onclick="saveAll()">💾 Save करा</button>
    <div class="save-success" id="saveSuccess">✅ Save झाले!</div>
    <button class="logout-btn" onclick="logout()">Logout</button>
    <div style="height:30px"></div>
  </div>
</div>

<script>
// ===== DEFAULT DATA =====
const DEFAULT = {
  shopName: 'ताजी भाजी',
  tagline: 'रोज ताजे • थेट शेतातून',
  waNumber: '',
  shopClosed: false,
  password: 'admin123',
  items: [
    { name: 'टोमॅटो', price: '30', unit: 'kg', badge: 'fresh' },
    { name: 'कांदा', price: '25', unit: 'kg', badge: '' },
    { name: 'बटाटा', price: '20', unit: 'kg', badge: '' },
    { name: 'कोथिंबीर', price: '10', unit: 'जुडी', badge: 'fresh' },
    { name: 'भेंडी', price: '40', unit: 'kg', badge: '' },
    { name: 'वांगे', price: '30', unit: 'kg', badge: '' },
    { name: 'दोडका', price: '35', unit: 'kg', badge: 'fresh' },
    { name: 'शेवगा', price: '50', unit: 'kg', badge: 'limited' },
  ],
  lastUpdated: ''
};

const VEGGIE_EMOJIS = {
  'टोमॅटो': '🍅', 'कांदा': '🧅', 'बटाटा': '🥔', 'कोथिंबीर': '🌿',
  'भेंडी': '🫑', 'वांगे': '🍆', 'दोडका': '🥒', 'शेवगा': '🌿',
  'मिरची': '🌶️', 'लसूण': '🧄', 'आले': '🫚', 'पालक': '🥬',
  'फ्लॉवर': '🥦', 'कोबी': '🥬', 'गाजर': '🥕', 'मेथी': '🌿',
  'default': '🥬'
};

function getEmoji(name) {
  return VEGGIE_EMOJIS[name] || VEGGIE_EMOJIS['default'];
}

// ===== LOAD DATA =====
function loadData() {
  try {
    const saved = localStorage.getItem('pbVeggieData');
    return saved ? JSON.parse(saved) : { ...DEFAULT };
  } catch { return { ...DEFAULT }; }
}

function saveData(data) {
  localStorage.setItem('pbVeggieData', JSON.stringify(data));
}

// ===== CUSTOMER PAGE =====
function renderCustomer() {
  const data = loadData();

  document.getElementById('displayShopName').textContent = data.shopName || DEFAULT.shopName;
  document.getElementById('displayTagline').textContent = data.tagline || DEFAULT.tagline;

  const closedBanner = document.getElementById('closedBanner');
  closedBanner.style.display = data.shopClosed ? 'block' : 'none';

  if (data.lastUpdated) {
    document.getElementById('displayUpdateTime').textContent = '🕐 ' + data.lastUpdated + ' ला update केले';
  } else {
    document.getElementById('displayUpdateTime').textContent = '🌿 आजची ताजी यादी';
  }

  // WhatsApp button
  const waBtn = document.getElementById('waBtn');
  const num = data.waNumber || '';
  const msg = encodeURIComponent('नमस्कार! मला भाज्या हव्या आहेत 🥦');
  if (num) {
    waBtn.href = `https://wa.me/${num}?text=${msg}`;
  } else {
    waBtn.href = '#';
    waBtn.onclick = () => alert('WhatsApp number अजून set केला नाही. Admin मध्ये जाऊन set करा.');
  }

  // Items
  const container = document.getElementById('customerItems');
  if (!data.items || data.items.length === 0) {
    container.innerHTML = '<div class="empty-msg">📦 आज यादी update झाली नाही</div>';
    return;
  }

  container.innerHTML = '';
  data.items.forEach((item, i) => {
    const emoji = getEmoji(item.name);
    let badgeHtml = '';
    if (item.badge === 'fresh') badgeHtml = '<span class="badge-fresh">✨ ताजे</span>';
    if (item.badge === 'limited') badgeHtml = '<span class="badge-limited">⚡ थोडे उरले</span>';

    const card = document.createElement('div');
    card.className = 'item-card';
    card.style.animationDelay = (i * 0.05) + 's';
    card.innerHTML = `
      <div class="item-left">
        <span class="item-emoji">${emoji}</span>
        <div>
          <div class="item-name">${item.name}</div>
          <div class="item-unit">प्रति ${item.unit}</div>
          ${badgeHtml}
        </div>
      </div>
      <div class="item-price">₹${item.price}</div>
    `;
    container.appendChild(card);
  });
}

// ===== ADMIN =====
function showAdmin() {
  document.getElementById('customerPage').style.display = 'none';
  document.getElementById('adminPage').style.display = 'block';
  document.getElementById('pwdInput').value = '';
  document.getElementById('loginError').textContent = '';
}

function goBack() {
  document.getElementById('adminPage').style.display = 'none';
  document.getElementById('customerPage').style.display = 'block';
  document.getElementById('adminPanel').style.display = 'none';
  document.getElementById('loginWrap').style.display = 'block';
  renderCustomer();
}

function checkLogin() {
  const data = loadData();
  const pwd = document.getElementById('pwdInput').value;
  const correct = data.password || DEFAULT.password;
  if (pwd === correct) {
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('adminPanel').style.display = 'block';
    loadAdminPanel();
  } else {
    document.getElementById('loginError').textContent = '❌ Password चुकला!';
  }
}

function logout() {
  document.getElementById('adminPanel').style.display = 'none';
  document.getElementById('loginWrap').style.display = 'block';
  document.getElementById('pwdInput').value = '';
}

function loadAdminPanel() {
  const data = loadData();
  document.getElementById('shopName').value = data.shopName || '';
  document.getElementById('shopTagline').value = data.tagline || '';
  document.getElementById('waNumber').value = data.waNumber || '';
  document.getElementById('shopClosed').checked = data.shopClosed || false;

  renderAdminItems(data.items || []);
}

function renderAdminItems(items) {
  const container = document.getElementById('adminItems');
  container.innerHTML = '';
  items.forEach((item, i) => {
    const card = document.createElement('div');
    card.className = 'item-admin-card';
    card.dataset.index = i;
    card.innerHTML = `
      <div class="item-admin-top">
        <input type="text" value="${item.name}" placeholder="भाजी नाव" class="item-name-inp">
        <button class="del-btn" onclick="removeItem(${i})">🗑</button>
      </div>
      <div class="item-admin-bottom">
        <input type="number" value="${item.price}" placeholder="किंमत ₹" class="item-price-inp">
        <input type="text" value="${item.unit}" placeholder="unit" class="item-unit-inp" style="max-width:70px">
        <select class="badge-select item-badge-inp">
          <option value="" ${item.badge===''?'selected':''}>—</option>
          <option value="fresh" ${item.badge==='fresh'?'selected':''}>✨ ताजे</option>
          <option value="limited" ${item.badge==='limited'?'selected':''}>⚡ थोडे उरले</option>
        </select>
      </div>
    `;
    container.appendChild(card);
  });
}

function addItem() {
  const data = loadData();
  const items = data.items || [];
  items.push({ name: '', price: '', unit: 'kg', badge: '' });
  renderAdminItems(items);
  // scroll to bottom
  document.getElementById('adminItems').lastElementChild?.scrollIntoView({ behavior: 'smooth' });
}

function removeItem(index) {
  const data = loadData();
  data.items.splice(index, 1);
  renderAdminItems(data.items);
}

function collectItems() {
  const cards = document.querySelectorAll('.item-admin-card');
  const items = [];
  cards.forEach(card => {
    const name = card.querySelector('.item-name-inp').value.trim();
    const price = card.querySelector('.item-price-inp').value.trim();
    const unit = card.querySelector('.item-unit-inp').value.trim() || 'kg';
    const badge = card.querySelector('.item-badge-inp').value;
    if (name && price) items.push({ name, price, unit, badge });
  });
  return items;
}

function saveAll() {
  const data = loadData();

  data.shopName = document.getElementById('shopName').value.trim() || DEFAULT.shopName;
  data.tagline = document.getElementById('shopTagline').value.trim() || DEFAULT.tagline;
  data.waNumber = document.getElementById('waNumber').value.trim();
  data.shopClosed = document.getElementById('shopClosed').checked;
  data.items = collectItems();

  // Password change
  const newPwd = document.getElementById('newPwd').value;
  const confirmPwd = document.getElementById('confirmPwd').value;
  if (newPwd) {
    if (newPwd !== confirmPwd) {
      alert('❌ Password match झाला नाही!');
      return;
    }
    data.password = newPwd;
    document.getElementById('newPwd').value = '';
    document.getElementById('confirmPwd').value = '';
  }

  // Update time
  const now = new Date();
  const timeStr = now.toLocaleTimeString('mr-IN', { hour: '2-digit', minute: '2-digit' });
  const dateStr = now.toLocaleDateString('mr-IN', { day: 'numeric', month: 'short' });
  data.lastUpdated = `${dateStr}, ${timeStr}`;

  saveData(data);

  const successEl = document.getElementById('saveSuccess');
  successEl.style.display = 'block';
  setTimeout(() => successEl.style.display = 'none', 2500);
}

// ===== INIT =====
renderCustomer();
</script>
</body>
</html>
